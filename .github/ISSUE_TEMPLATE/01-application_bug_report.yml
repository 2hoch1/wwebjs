name: App bug report
description: Report a bug in one of our applications
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **This issue form is for apps like website, documentation or guide**

        Thanks for taking the time to report a bug! Please check the [issue tracker](https://github.com/wwebjs/wwebjs/issues) before submitting.

  - type: dropdown
    id: app
    attributes:
      label: Which app is this bug report for?
      options:
        - website
        - docs
        - guide
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Issue priority
      description: Be realistic. Elaborate in the description if needed.
      options:
        - Low (slightly annoying)
        - Medium (should be fixed soon)
        - High (immediate attention needed)
      default: 1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue description
      description: Provide a clear and concise description of the problem.
      placeholder: |
        Example: The search function on the docs page returns no results when searching for "authentication"...
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to the docs page...
        2. Click on the search bar...
        3. Type "authentication"...
        4. See no results displayed
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Page URL
      description: Which page does this issue occur on?
      placeholder: https://wwebjs.dev/docs/getting-started
    validations:
      required: false

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
      placeholder: The search should display relevant documentation pages...
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
      placeholder: Drag and drop images here or paste them directly.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide relevant environment details.
      placeholder: |
        - Browser: Chrome 120
        - OS: Windows 11
        - Screen size: 1920x1080
        - Device: Desktop
      render: markdown
    validations:
      required: false

  - type: textarea
    id: console_errors
    attributes:
      label: Browser console errors
      description: If applicable, paste any console errors (Press F12 to open developer tools).
      render: javascript
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and confirmed this is not a duplicate
          required: true
        - label: I have verified this occurs on the latest version
          required: true
